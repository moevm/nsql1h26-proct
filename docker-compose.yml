services:
  db:
    image: mongo:7.0
    restart: unless-stopped
    volumes:
      - db_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: proctoring

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      - db
    environment:
      NODE_ENV: production
      PORT: 8080
    ports:
      - "127.0.0.1:18080:8080"

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "127.0.0.1:5173:5173"

volumes:
  db_data:
